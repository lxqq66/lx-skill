name: README i18n sync

on:
  push:
    paths:
      - "README*.md"
      - "docs/i18n-maintenance.md"
      - "scripts/check_i18n_sync.py"
      - ".github/workflows/i18n-sync.yml"
  pull_request:
    paths:
      - "README*.md"
      - "docs/i18n-maintenance.md"
      - "scripts/check_i18n_sync.py"
      - ".github/workflows/i18n-sync.yml"

permissions:
  contents: read

jobs:
  check-readme-translations:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Verify localized README synchronization
        run: python3 scripts/check_i18n_sync.py
